<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Ekranı 💖</title>
    <!-- Tatlı fontları ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #FFFDF5; /* Pastel Krem Arka Plan */
            overflow: hidden; /* Yıldızlar taşmasın diye */
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 🌟 SÜREKLİ UÇUŞAN YILDIZLAR ANIMASYONU */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background-color: #FFF59D; /* Soft Pastel Sarı Yıldız */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-5vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* ✉️ GİRİŞ VE MEKTUP ALANI */
        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.6s ease-in-out;
        }

        /* Görseldeki gibi pürüzsüz ve tatlı mektup zarfı */
        .envelope-wrapper {
            position: relative;
            width: 280px;
            height: 180px;
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #FFF1F3;
        }
        /* Zarfın arka katlanma çizgileri çizgileri */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(255,241,243,0.5) 25%, transparent 25%),
                        linear-gradient(225deg, rgba(255,241,243,0.5) 25%, transparent 25%);
            background-size: 100% 100%;
            pointer-events: none;
        }
        /* Görseldeki kocaman, pürüzsüz soft pembe kalp */
        .heart-seal {
            font-size: 75px;
            color: #FFB6C1; /* Soft Pastel Pembe */
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(255, 182, 193, 0.4));
            transition: transform 0.3s ease;
            user-select: none;
            z-index: 2;
        }
        .heart-seal:hover {
            transform: scale(1.15);
        }

        /* İsim Giriş Kutusu */
        .input-box {
            font-family: 'Quicksand', sans-serif;
            padding: 12px 20px;
            border: 2px solid #FFE4E8;
            border-radius: 25px;
            outline: none;
            text-align: center;
            font-size: 16px;
            width: 220px;
            background-color: #FFF;
            color: #FF8A9A;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .input-box:focus {
            border-color: #FFB6C1;
            box-shadow: 0 4px 15px rgba(255,182,193,0.2);
        }
        .input-box::placeholder {
            color: #FFC0CB;
            font-weight: normal;
        }

        /* Giriş Butonu */
        .login-btn {
            font-family: 'Fredoka', sans-serif;
            background-color: #FFB6C1;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255,182,193,0.4);
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background-color: #FF9AA2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- 🌟 Yıldızların Uçuşacağı Konteyner -->
    <div class="stars-container"></div>

    <!-- ✉️ Giriş Ekranı -->
    <div class="login-container" id="loginArea">
        <div class="envelope-wrapper">
            <!-- Kalbe basınca da giriş yapılabilecek -->
            <div class="heart-seal" onclick="girisKontrol()">💖</div>
        </div>
        <input type="text" id="sevgiliAdi" class="input-box" placeholder="Adını yazar mısın aşkım? 🥺">
        <button class="login-btn" onclick="girisKontrol()">Mektubu Aç</button>
    </div>

    <script>
        // 🌟 KESİNTİSİZ UÇUŞAN YILDIZ SİSTEMİ
        function createStars() {
            const container = document.querySelector('.stars-container');
            const starCount = 35; // Dengeli bir yoğunluk için

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Yıldız boyutları rastgele (mini mini)
                const size = Math.random() * 8 + 6;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Ekran geneline yatay olarak rastgele dağıtıyoruz
                star.style.left = Math.random() * 100 + 'vw';
                
                // Hepsi aynı anda çıkmasın diye rastgele gecikmeler
                star.style.animationDelay = Math.random() * 6 + 's';
                
                // Tatlı ve yavaş bir hız
                star.style.animationDuration = Math.random() * 4 + 6 + 's';
                
                container.appendChild(star);
            }
        }
        // Sayfa açıldığında yıldızlar üremeye başlasın
        window.addEventListener('DOMContentLoaded', createStars);

        // ✉️ GİRİŞ KONTROLÜ
        function girisKontrol() {
            const isimInput = document.getElementById('sevgiliAdi').value.trim();
            
            // "ümit" veya "Ümit" yazarsa kabul et
            if (isimInput.toLowerCase() === 'ümit') {
                const loginArea = document.getElementById('loginArea');
                
                // Giriş başarılı olunca zarfın küçülüp yok olma animasyonu
                loginArea.style.opacity = '0';
                loginArea.style.transform = 'scale(0.8) translateY(-50px)';
                
                setTimeout(() => {
                    alert("Giriş başarılı! (Buradan sonra kuponlar sayfasına geçiş yapacağız) ✨");
                }, 400);
            } else if (isimInput === "") {
                alert("Aşkım önce ismini yazman gerekiyor 🥺");
            } else {
                alert("Hımm... Bu mektup sadece Ümit'e özel yazılmış! Lütfen doğru ismi gir 🙈");
            }
        }
    </script>
</body>
</html>
